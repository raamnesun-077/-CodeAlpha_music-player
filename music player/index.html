<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="player">

    <img id="cover" src="images/cover1.jpg">

    <h2 id="title">Song Title</h2>
    <h4 id="artist">Artist</h4>

    <div class="time">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
    </div>

    <input type="range" id="progress" value="0">

    <div class="controls">
        <button id="prev"><i class="fa-solid fa-backward"></i></button>
        <button id="play"><i class="fa-solid fa-play"></i></button>
        <button id="next"><i class="fa-solid fa-forward"></i></button>
    </div>

    <div class="volume-box">
        <i class="fa-solid fa-volume-high"></i>
        <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
    </div>

    <h3>Playlist</h3>

    <ul id="playlist"></ul>

</div>

<audio id="audio"></audio>

<script src="script.js"></script>

</body>
</html>
